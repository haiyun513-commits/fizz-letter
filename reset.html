<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>重置密码 · 泡沫来信</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth-theme.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div class="aurora">
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
  </div>
  <div class="noise-overlay"></div>

  <div class="auth-modal-content">
    <div id="reset-form">
      <h3 class="auth-title">重置密码</h3>
      <input type="password" id="reset-password" class="auth-input" placeholder="新密码（至少6位）">
      <input type="password" id="reset-confirm" class="auth-input" placeholder="确认新密码">
      <button id="btn-reset" class="auth-submit" style="animation:none;">重置密码</button>
      <div id="reset-error" class="auth-error"></div>
    </div>
    <div id="reset-success" style="display:none;">
      <h3 class="auth-title">密码已重置</h3>
      <p class="auth-hint" style="margin-bottom:16px;">现在可以用新密码登录了</p>
      <div class="auth-switch"><a href="/" style="color:var(--accent);text-decoration:none;">返回泡沫来信</a></div>
    </div>
  </div>

  <script>
    // 主题同步
    const savedTheme = localStorage.getItem('fizz_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('reset-error').textContent = '链接无效';
      document.getElementById('btn-reset').disabled = true;
      document.getElementById('btn-reset').style.opacity = '0.4';
    }

    document.getElementById('btn-reset').addEventListener('click', async () => {
      const password = document.getElementById('reset-password').value;
      const confirm = document.getElementById('reset-confirm').value;
      const errorEl = document.getElementById('reset-error');
      errorEl.textContent = '';

      if (!password || password.length < 6) { errorEl.textContent = '密码至少6位'; return; }
      if (password !== confirm) { errorEl.textContent = '两次密码不一致'; return; }

      try {
        const resp = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error);
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('reset-success').style.display = 'block';
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
