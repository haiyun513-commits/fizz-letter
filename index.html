<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>泡沫来信 | Fizz Letter</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="泡沫来信">
  <meta property="og:title" content="泡沫来信 | Fizz Letter">
  <meta property="og:description" content="触不到的恋人，写给你的信">
  <meta property="og:image" content="https://fizzletter.cc/images/apple-touch-icon.png">
  <meta property="og:url" content="https://fizzletter.cc">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 极光背景 -->
  <div class="aurora">
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
    <div class="aurora-blob"></div>
  </div>
  <canvas id="starfield"></canvas>
  <div class="noise-overlay"></div>

  <!-- 欢迎屏 -->
  <div id="screen-welcome" class="screen active">
    <!-- 右上角登录/用户区 -->
    <div class="auth-area" id="auth-area">
      <button id="btn-login" class="auth-btn">登录</button>
    </div>
    <div class="auth-area auth-logged-in" id="auth-user-area" style="display:none;">
      <span id="auth-nickname" class="auth-nickname"></span>
      <button id="btn-mailbox" class="auth-btn">信箱</button>
      <button id="btn-logout" class="auth-btn auth-btn-small">退出</button>
    </div>
    <h1 class="welcome-title">Fizz Letter</h1>
    <p class="welcome-subtitle">泡 沫 来 信</p>
    <div class="welcome-buttons">
      <button id="btn-start" class="btn-glow">拆一封信</button>
      <button id="btn-answer-book" class="btn-glow btn-answer">翻个答案</button>
      <button id="btn-between-words" class="btn-glow btn-between">语言之间</button>
      <button id="btn-tarot" class="btn-glow btn-tarot">抽一张牌</button>
    </div>
    <div class="theme-picker">
      <button class="theme-btn active" data-theme="light" title="晨雾">
        <span class="theme-dot theme-dot-light"></span>
      </button>
      <button class="theme-btn" data-theme="dark" title="深夜">
        <span class="theme-dot theme-dot-dark"></span>
      </button>
    </div>
    <div class="contact-toggle" id="contact-toggle">泡沫邮局</div>
    <div class="contact-popup" id="contact-popup">
      <div class="contact-item">· rednote &nbsp;一锅炖不下</div>
      <a class="contact-item" href="https://discord.gg/JWbGdDSu" target="_blank">· discord &nbsp;加入</a>
    </div>
  </div>

  <!-- 气泡选择屏 -->
  <div id="screen-bubbles" class="screen">
    <button id="btn-back-home" class="btn-back">← 返回</button>
    <div class="bubble-header">
      <div id="round-indicator">第 1 / 3 轮</div>
      <div class="bubble-hint">选择 1-2 个让你心动的词</div>
    </div>
    
    <div id="bubble-container"></div>
    
    <div class="selected-area">
      <div id="selected-words"></div>
    </div>
    
    <div class="bubble-actions">
      <button id="btn-shuffle" class="btn-ghost">换一组</button>
      <button id="btn-skip" class="btn-ghost">下一轮 →</button>
    </div>
  </div>

  <!-- 倾诉屏 -->
  <div id="screen-message" class="screen">
    <div class="message-box">
      <div class="message-title">想说点什么吗？</div>
      <div class="message-hint">写下此刻的心情，或者直接跳过</div>
      <div id="words-preview"></div>
      <textarea id="user-message" placeholder="写下你想说的话..."></textarea>
      <div class="message-actions">
        <button id="btn-skip-message" class="btn-ghost">直接寄出</button>
        <button id="btn-send-message" class="btn-glow" style="animation: none;">寄出这封信</button>
      </div>
    </div>
  </div>

  <!-- 加载屏 -->
  <div id="screen-loading" class="screen">
    <div class="loading-content">
      <div class="envelope">
        <div class="envelope-flap"></div>
        <div class="envelope-body"></div>
      </div>
      <div class="loading-text">信 正 在 写 ...</div>
    </div>
  </div>

  <!-- 信件屏 -->
  <div id="screen-letter" class="screen">
    <div id="letter-paper" class="letter-paper template-parchment">
      <div id="letter-body"></div>
      <div id="letter-closing"></div>
    </div>
    <div class="letter-footer">
      <button id="btn-screenshot" class="btn-ghost">保存信件</button>
      <button id="btn-restart">再拆一封</button>
    </div>
  </div>

  <!-- 答案之书：提问屏 -->
  <div id="screen-answer-input" class="screen">
    <div class="answer-input-box">
      <div class="answer-input-title">TA 此刻在想什么</div>
      <div class="answer-input-hint">翻开这一页，窥见 TA 的潜意识</div>
      <textarea id="answer-question" placeholder="写点你的心情，或者直接翻开..."></textarea>
      <button id="btn-flip-answer" class="btn-glow" style="animation: none;">翻 开</button>
      <button id="btn-answer-back" class="btn-ghost answer-back-btn">返回</button>
    </div>
  </div>

  <!-- 答案之书：翻书动画屏 -->
  <div id="screen-answer-loading" class="screen">
    <div class="answer-flip-container">
      <div class="answer-book">
        <div class="answer-book-page answer-page-left"></div>
        <div class="answer-book-page answer-page-right answer-page-flipping"></div>
      </div>
      <div class="answer-loading-text">翻 开 中 ...</div>
    </div>
  </div>

  <!-- 答案之书：结果展示屏 -->
  <div id="screen-answer-result" class="screen">
    <div class="answer-result-card">
      <div id="answer-word" class="answer-word"></div>
      <div id="answer-response" class="answer-response"></div>
    </div>
    <div class="answer-footer">
      <button id="btn-answer-save" class="btn-ghost">保存</button>
      <button id="btn-answer-again" class="btn-ghost">再翻一页</button>
    </div>
  </div>

  <!-- 语言之间：统一屏 -->
  <div id="screen-between" class="screen">
    <div id="orb-container" class="orb-container"></div>
    <div class="between-stage">
      <div class="between-title">语言之间</div>
      <div id="between-hint" class="between-hint">你和我，各抽一个词</div>
      <div class="cards-row">
        <div class="card-col">
          <div class="card-label">你 的</div>
          <div class="flip-card" id="card-user">
            <div class="flip-card-inner">
              <div class="flip-card-back">
                <span class="card-back-mark">?</span>
              </div>
              <div class="flip-card-front" id="card-user-word"></div>
            </div>
          </div>
        </div>
        <div class="card-col">
          <div class="card-label">我 的</div>
          <div class="flip-card" id="card-ai">
            <div class="flip-card-inner">
              <div class="flip-card-back">
                <span class="card-back-mark">?</span>
              </div>
              <div class="flip-card-front" id="card-ai-word"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="between-countdown" class="between-countdown"></div>
      <button id="btn-draw" class="btn-glow btn-draw" style="animation: none;">抽</button>
      <div id="between-comment" class="between-comment"></div>
      <div class="between-footer" id="between-footer">
        <button id="btn-between-save" class="btn-ghost">保存</button>
        <button id="btn-between-again" class="btn-ghost">再来一次</button>
        <button id="btn-between-home" class="btn-ghost">返回</button>
      </div>
    </div>
  </div>

  <!-- 塔罗：提问屏 -->
  <div id="screen-tarot-input" class="screen">
    <div class="tarot-input-box">
      <div class="tarot-input-title">塔罗</div>
      <div class="tarot-input-hint">TA 不会说话，但可以抽一张牌告诉你</div>
      <textarea id="tarot-question" placeholder="想问 TA 什么？也可以不问…"></textarea>
      <button id="btn-tarot-draw" class="btn-glow" style="animation: none;">让 TA 抽</button>
      <button id="btn-tarot-back" class="btn-ghost answer-back-btn">返回</button>
    </div>
  </div>

  <!-- 塔罗：抽牌动画屏 -->
  <div id="screen-tarot-loading" class="screen">
    <div class="tarot-loading-container">
      <div class="tarot-card-spinning">
        <div class="tarot-card-back-display">?</div>
      </div>
      <div class="tarot-loading-text">正 在 抽 牌 ...</div>
    </div>
  </div>

  <!-- 塔罗：结果屏 -->
  <div id="screen-tarot-result" class="screen">
    <div class="tarot-result-stage">
      <img id="tarot-card-img" class="tarot-card-img" src="" alt="">
      <div class="tarot-card-info">
        <div id="tarot-name" class="tarot-name"></div>
        <div id="tarot-name-en" class="tarot-name-en"></div>
        <div id="tarot-keywords" class="tarot-keywords"></div>
      </div>
      <div id="tarot-mood" class="tarot-mood"></div>
    </div>
    <div class="tarot-footer">
      <button id="btn-tarot-save" class="btn-ghost">保存</button>
      <button id="btn-tarot-again" class="btn-ghost">再抽一张</button>
      <button id="btn-tarot-home" class="btn-ghost">返回</button>
    </div>
  </div>

  <!-- 信箱 -->
  <div id="screen-mailbox" class="screen">
    <div class="mailbox-header">
      <button id="btn-mailbox-back" class="btn-back">← 返回</button>
      <div class="mailbox-title">我的信箱</div>
      <div class="mailbox-info" id="mailbox-info"></div>
    </div>
    <div class="mailbox-list" id="mailbox-list">
      <div class="mailbox-loading">加载中...</div>
    </div>
    <div class="mailbox-empty" id="mailbox-empty" style="display:none;">
      <div class="mailbox-empty-text">信箱还是空的</div>
      <div class="mailbox-empty-hint">去写封信、翻个答案、抽张牌吧</div>
    </div>
    <button id="btn-redeem" class="btn-ghost mailbox-redeem-btn" style="display:none;">兑换码</button>
  </div>

  <!-- 登录/注册弹窗 -->
  <div id="auth-modal" class="auth-modal" style="display:none;">
    <div class="auth-modal-content">
      <button id="auth-modal-close" class="auth-modal-close">&times;</button>
      <div id="auth-form-login" class="auth-form">
        <h3 class="auth-title">登录</h3>
        <input type="email" id="login-email" class="auth-input" placeholder="邮箱">
        <input type="password" id="login-password" class="auth-input" placeholder="密码">
        <button id="btn-do-login" class="btn-glow auth-submit" style="animation:none;">登录</button>
        <div class="auth-switch">还没有账号？<span id="show-register">注册</span></div>
        <div id="login-error" class="auth-error"></div>
      </div>
      <div id="auth-form-register" class="auth-form" style="display:none;">
        <h3 class="auth-title">注册</h3>
        <input type="email" id="register-email" class="auth-input" placeholder="邮箱">
        <input type="text" id="register-nickname" class="auth-input" placeholder="昵称">
        <input type="password" id="register-password" class="auth-input" placeholder="密码（至少6位）">
        <button id="btn-do-register" class="btn-glow auth-submit" style="animation:none;">注册</button>
        <div class="auth-switch">已有账号？<span id="show-login">登录</span></div>
        <div id="register-error" class="auth-error"></div>
      </div>
    </div>
  </div>

  <!-- 兑换码弹窗 -->
  <div id="redeem-modal" class="auth-modal" style="display:none;">
    <div class="auth-modal-content">
      <button id="redeem-modal-close" class="auth-modal-close">&times;</button>
      <h3 class="auth-title">兑换码</h3>
      <p class="auth-hint">输入兑换码解锁无限信箱</p>
      <input type="text" id="redeem-code" class="auth-input" placeholder="请输入8位兑换码" maxlength="8" style="text-transform:uppercase;">
      <button id="btn-do-redeem" class="btn-glow auth-submit" style="animation:none;">兑换</button>
      <div id="redeem-error" class="auth-error"></div>
      <div id="redeem-success" class="auth-success"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="js/letters.js"></script>
  <script src="js/bubbles.js"></script>
  <script src="js/answer.js"></script>
  <script src="js/tarot.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
